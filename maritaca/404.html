<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicons/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
  <title>Página não encontrada · Flat Maritaca</title>
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      background: var(--bg);
    }
    .not-found-inner { max-width: 520px; }
    .not-found-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 14vw, 8rem);
      font-weight: 300;
      color: var(--accent);
      line-height: 1;
      margin: 0;
      letter-spacing: 0.02em;
    }
    .not-found h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 400;
      margin: 18px 0 14px;
      color: var(--text);
    }
    .not-found p {
      color: var(--text-muted);
      margin-bottom: 26px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="not-found">
    <div class="not-found-inner">
      <p class="not-found-code">404</p>
      <h1>A página se perdeu na trilha 🌴</h1>
      <p>This page took a wrong turn — or maybe it's drying off at the beach. Let's get you back.</p>
      <a href="/" class="btn">
        <i class="fas fa-arrow-left"></i> Voltar para o início
      </a>
    </div>
  </main>
</body>
</html>
